<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Contact Grandberry</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>Grandberry Interactive Entertainment</h1>
            <nav>
                <ul>
                    <li class="button"><a href="index.html">Home</a></li>
                    <li class="button"><a href="about.html">About</a></li>
                    <li class="button"><a href="games.html">Games & Demos</a></li>
                    <li class="button"><a href="blog.html">Blog</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h1>Contact Grandberry</h1>
            <p><strong>Get in contact with Grandberry by sending a form!</strong></p>
        </main> 

        <div class="form-container">
            <fieldset id="contact">
                <form action="mailto:gilbjj@farmingdale.edu" method="POST" enctype="text/plain">
                    <p>
                        <label for="name">Name:</label>
                        <input type="text" name="first" id="first" required>
                    </p>
                    <p>
                        <label for="address">Email Address:</label>
                        <input type="text" name="address" id="address" required>
                    </p>
                    <p>
                        <label for="subject">Subject:</label>
                        <input type="text" name="subject" id="subject" required>
                    </p>
                    <p>
                        <label for="summary">Summary:</label>
                        <textarea id="summary" name="summary" rows="4" cols="50" placeholder="Leave your message here!"></textarea>
                    </p>
                    <input type="submit" value="Submit">
                </form>
            </fieldset>
        </div>

</html>
